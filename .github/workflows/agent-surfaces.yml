name: agent surfaces gate

# 에이전트 목록 정합 가드 — main push + 모든 PR 에서 강제한다.
# 왜: 앱·웹·스토어·README 가 «어떤 코드 에이전트를 지원하는지» 를 저마다 노출하는데, 한 곳만
#   고치고 다른 곳을 빠뜨려도 머지 전에 자동으로 걸러내지 못해 신규 사용자가 화면마다 다른 목록을
#   보게 될 수 있었다. agent-surfaces-lint·po-agent-lint 는 «후보 표면화» 도구지만 둘 다 현재
#   0 종료(클린)라 즉시 차단 게이트로 안전하다(향후 거짓 양성이 나오면 i18n-lint 처럼 baseline
#   차감을 검토). i18n.yml 과 동형의 게이트 계약(러너·permissions·트리거)을 따른다.
# 무엇:
#   1) ./scripts/agent-surfaces-lint.sh — 픽커 SSOT ↔ 5개 노출 표면(README.md=영어 제목 ·
#      README.ko.md=한국어 제목 · web · iOS/Mac 가이드) 정합을 «차단»(비-0 시 PR 차단).
#   2) ./scripts/po-agent-lint.sh — PO 진입점의 에이전트 선택 누락 후보를 «차단».
#   3) ./scripts/test-agent-surfaces-lint.sh — 검출 로직 «자체» 의 회귀 방지(self-test, 차단).
#   4) ./scripts/test-po-agent-lint.sh — 동(self-test, 차단). git blob 비교(7265d2d^)가 있어
#      fetch-depth: 0(전체 히스토리)로 체크아웃한다.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  agent-surfaces:
    runs-on: ubuntu-latest
    steps:
      # 게이트·self-test 는 «작업 트리»(현재 체크아웃) 만 스캔한다 — git 히스토리 비의존이라
      # 기본(shallow) 체크아웃으로 충분하다. (과거엔 test-po-agent-lint.sh 가 git show 7265d2d^ 로
      # 실파일을 떠 fetch-depth: 0 이 필요했으나, 공개 스쿼시로 그 커밋이 사라져 합성 픽스처로 전환.)
      - uses: actions/checkout@v4

      # ubuntu-latest 는 python3·bash 기본 제공 — 별도 설치 없이 휴리스틱이 그대로 돈다(노드/빌드 불필요).
      - name: agent-surfaces-lint (게이트)
        run: ./scripts/agent-surfaces-lint.sh

      - name: po-agent-lint (게이트)
        run: ./scripts/po-agent-lint.sh

      - name: test-agent-surfaces-lint (검출 로직 self-test)
        run: ./scripts/test-agent-surfaces-lint.sh

      - name: test-po-agent-lint (검출 로직 self-test)
        run: ./scripts/test-po-agent-lint.sh
