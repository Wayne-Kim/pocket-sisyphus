# web/ 소개 사이트를 GitHub Pages 로 정적 배포한다 (github.io 프로젝트 페이지).
# - 이 저장소(pocket-sisyphus)가 공개되면서 web/ 를 «직접» Pages 로 배포한다
#   (예전엔 별도 공개 repo 로 미러했지만 더 이상 불필요).
# - 프로젝트 페이지는 `/pocket-sisyphus` 하위경로로 서빙되므로 basePath 를 그 값으로 준다
#   (아래 NEXT_PUBLIC_BASE_PATH). 안 주면 `_next` 자산이 전부 404 난다. CNAME 은 없다 —
#   커스텀 도메인(pocketsisyphus.app)은 미등록이라 쓰지 않는다.
# - 최초 1회(메인테이너): repo Settings → Pages → Build and deployment → Source = "GitHub Actions".
#   딥링크 브리지(daemon Discord 알림)도 이 사이트의 /open 페이지를 가리킨다
#   (mac/daemon/src/notify/discord.ts DEFAULT_DEEP_LINK_BRIDGE_BASE).
name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 1개로 제한(중복 실행 시 진행 중인 것 유지하고 대기열 정리)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - run: pnpm install --frozen-lockfile

      - name: Build static export
        env:
          # github.io 프로젝트 페이지 — `/pocket-sisyphus` 하위경로 서빙.
          # basePath 가 _next 자산·링크·og:image 절대 URL 에 반영된다.
          NEXT_PUBLIC_BASE_PATH: "/pocket-sisyphus"
          NEXT_PUBLIC_SITE_URL: "https://wayne-kim.github.io"
        run: pnpm build

      # .nojekyll 보장 — 없으면 Pages 가 Jekyll 로 처리해 «_next» (밑줄 디렉터리)를 통째로
      # 떨궈 모든 자산이 404 난다. public 의 dotfile 이 아티팩트에 안 실리는 경우가 있어 여기서 강제 생성.
      - name: Disable Jekyll
        run: touch out/.nojekyll # working-directory 가 web 이라 web/out 아님

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
