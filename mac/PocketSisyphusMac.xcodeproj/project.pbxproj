			shellScript = "set -e\nif [ \"${CONFIGURATION}\" != \"Release\" ]; then\n  echo \"[sign-nested] skip (CONFIGURATION=${CONFIGURATION})\"\n  exit 0\nfi\nDAEMON=\"${TARGET_BUILD_DIR}/${WRAPPER_NAME}/Contents/Resources/daemon\"\nENT_NODE=\"${SRCROOT}/PocketSisyphusMac/PocketSisyphusMac-NodeRuntime.entitlements\"\nIDENTITY=\"${EXPANDED_CODE_SIGN_IDENTITY:-${CODE_SIGN_IDENTITY}}\"\nif [ -z \"${IDENTITY}\" ]; then\n  echo \"[sign-nested] error: CODE_SIGN_IDENTITY 비어 있음\" >&2\n  exit 1\nfi\n\n# sign_jit: V8 JIT 쓰는 바이너리. NodeRuntime entitlements 박음.\nsign_jit() {\n  local f=\"$1\"\n  if [ ! -e \"${f}\" ]; then\n    echo \"[sign-nested] warn: ${f} 없음 — 스킵\"\n    return\n  fi\n  /usr/bin/codesign \\\n    --force \\\n    --sign \"${IDENTITY}\" \\\n    --options runtime \\\n    --entitlements \"${ENT_NODE}\" \\\n    --timestamp \\\n    \"${f}\"\n  echo \"[sign-nested] signed ${f#${DAEMON}/}  (JIT)\"\n}\n\n# sign_plain: hardened runtime 만. tor / esbuild / dylib / .node native module.\nsign_plain() {\n  local f=\"$1\"\n  if [ ! -e \"${f}\" ]; then\n    echo \"[sign-nested] warn: ${f} 없음 — 스킵\"\n    return\n  fi\n  /usr/bin/codesign \\\n    --force \\\n    --sign \"${IDENTITY}\" \\\n    --options runtime \\\n    --timestamp \\\n    \"${f}\"\n  echo \"[sign-nested] signed ${f#${DAEMON}/}\"\n}\n\n# V8 JIT — node + Claude Agent SDK 내장 V8.\nsign_jit \"${DAEMON}/bin/node\"\nsign_jit \"${DAEMON}/node_modules/@anthropic-ai/claude-agent-sdk-darwin-arm64/claude\"\n\n# 일반 native — hardened runtime 만.\nsign_plain \"${DAEMON}/bin/tor\"\nsign_plain \"${DAEMON}/bin/sshd\"\n# OpenSSH 9.8+ re-exec 헬퍼 — sshd 가 연결마다 spawn. 빠지면 notarize 거부 +\n# 런타임 library validation 으로 sshd 가 헬퍼 spawn 실패.\nsign_plain \"${DAEMON}/bin/sshd-session\"\nsign_plain \"${DAEMON}/bin/sshd-auth\"\n# capture-helper: swiftc 가 adhoc(linker-signed)으로 떨궈서 Team ID 사인이 빠지면\n# notarize 가 거부한다. 시스템 프레임워크만 의존 → JIT 불필요(sign_plain).\nsign_plain \"${DAEMON}/bin/capture-helper\"\nsign_plain \"${DAEMON}/node_modules/@esbuild/darwin-arm64/bin/esbuild\"\nsign_plain \"${DAEMON}/node_modules/esbuild/bin/esbuild\"\n\n# bin/libs/ 의 dylib 들 — install_name_tool 이 무효화한 사인 복구.\nfor f in \"${DAEMON}/bin/libs/\"*.dylib; do\n  sign_plain \"${f}\"\ndone\n\n# node_modules 안의 .node native module — dlopen 으로 로드되는 dylib.\n# 처음엔 unsigned 라 hardened runtime 의 library validation 에 걸린다.\n# find 결과를 정확한 목록으로 사인해 빠진 항목 없게.\nwhile IFS= read -r f; do\n  sign_plain \"${f}\"\ndone < <(find \"${DAEMON}/node_modules\" -type f -name \"*.node\" 2>/dev/null)\n\n# node-pty 의 spawn-helper — 일반 Mach-O 실행파일. .node 가 아니라서 위 find 에\n# 안 잡힘. 추가로 npm 의 tarball 추출이 +x 비트를 떨굴 때가 있어 chmod 도 같이.\n# 두 아키텍처(arm64/x64) 모두 처리 — darwin-arm64 가 실 타겟이지만 안전망.\nfor f in \"${DAEMON}/node_modules/node-pty/prebuilds/\"*/spawn-helper; do\n  [ -e \"${f}\" ] || continue\n  chmod +x \"${f}\"\n  sign_plain \"${f}\"\ndone\n";
